---
- name: Find and prepare EC2 instance for OpenShift installation
  hosts: localhost
  gather_facts: false
  vars:
    aws_region: us-east-2
    instance_name: nested-virt-host
    ssh_private_key_path: "~/.ssh/id_rsa_fips"

  tasks:
    - name: Find existing EC2 instance
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          "instance-state-name": "running"
      register: instance_info

    - name: Fail if instance not found
      fail:
        msg: "No running instance found with Name tag: {{ instance_name }}"
      when: instance_info.instances | length == 0

    - name: Set instance facts
      set_fact:
        instance_id: "{{ instance_info.instances[0].instance_id }}"
        instance_public_ip: "{{ instance_info.instances[0].public_ip_address }}"

    - name: Display instance information
      debug:
        msg:
          - "Found instance: {{ instance_id }}"
          - "Public IP: {{ instance_public_ip }}"
          - "Preparing OpenShift install configuration..."

    - name: Add instance to host group
      add_host:
        hostname: "{{ instance_public_ip }}"
        groupname: target_hosts
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ ssh_private_key_path }}"

- name: Prepare OpenShift installation configuration
  hosts: target_hosts
  become: false
  gather_facts: true
  vars:
    # Override these variables as needed
    # ocp_cluster_name: ocp
    # ocp_base_domain: example.com
    # ocp_api_vip: 192.168.122.10
    # ocp_ingress_vip: 192.168.122.11

  roles:
    - openshift_install
