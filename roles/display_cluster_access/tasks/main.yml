---
- name: Set OpenShift installation directory
  set_fact:
    ocp_install_dir: /home/ec2-user/ocp-install

- name: Get EC2 instance public IP
  set_fact:
    instance_ip: "{{ ansible_host }}"

- name: Check for Cockpit service
  ansible.builtin.systemd:
    name: cockpit.socket
  register: cockpit_status
  failed_when: false

- name: Check for noVNC HTTP service
  ansible.builtin.systemd:
    name: novnc-http
  register: novnc_http_status
  failed_when: false

- name: Check for noVNC HTTPS service
  ansible.builtin.systemd:
    name: novnc-https
  register: novnc_https_status
  failed_when: false

- name: Check for Sushy emulator service
  ansible.builtin.systemd:
    name: sushy-emulator
  register: sushy_status
  failed_when: false

- name: Check for kubeconfig
  ansible.builtin.stat:
    path: "{{ ocp_install_dir }}/auth/kubeconfig"
  register: kubeconfig_check

- name: Check for kubeadmin password file
  ansible.builtin.stat:
    path: "{{ ocp_install_dir }}/auth/kubeadmin-password"
  register: kubeadmin_password_check

- name: Set OpenShift installed flag
  set_fact:
    openshift_installed: "{{ kubeconfig_check.stat.exists and kubeadmin_password_check.stat.exists }}"

- name: Read kubeadmin password
  ansible.builtin.slurp:
    src: "{{ ocp_install_dir }}/auth/kubeadmin-password"
  register: kubeadmin_password_content
  when: openshift_installed

- name: Set kubeadmin password fact
  set_fact:
    kubeadmin_password: "{{ kubeadmin_password_content.content | b64decode | trim }}"
  when: openshift_installed

- name: Extract cluster API server URL from kubeconfig
  ansible.builtin.shell: |
    grep 'server:' {{ ocp_install_dir }}/auth/kubeconfig | head -n1 | awk '{print $2}'
  register: api_server_url
  changed_when: false
  when: openshift_installed

- name: Extract cluster name from kubeconfig
  ansible.builtin.shell: |
    grep 'cluster:' {{ ocp_install_dir }}/auth/kubeconfig | head -n1 | awk '{print $2}'
  register: cluster_name_from_config
  changed_when: false
  when: openshift_installed

- name: Derive console URL from API server
  set_fact:
    console_url: "{{ api_server_url.stdout | regex_replace('api\\.', 'console-openshift-console.apps.') | regex_replace(':6443', '') }}"
  when: openshift_installed

- name: Get cluster version
  ansible.builtin.shell: oc get clusterversion -o jsonpath='{.items[0].status.desired.version}'
  register: cluster_version
  changed_when: false
  failed_when: false
  become: true
  become_user: ec2-user
  when: openshift_installed

- name: Get cluster nodes
  ansible.builtin.shell: oc get nodes --no-headers | wc -l
  register: node_count
  changed_when: false
  failed_when: false
  become: true
  become_user: ec2-user
  when: openshift_installed

- name: Get cluster operators status
  ansible.builtin.shell: oc get co --no-headers | grep -v "True.*False.*False" | wc -l
  register: degraded_operators_count
  changed_when: false
  failed_when: false
  become: true
  become_user: ec2-user
  when: openshift_installed

- name: Display EC2 instance basic info
  debug:
    msg:
      - "=========================================="
      - "EC2 Instance Connection Information"
      - "=========================================="
      - ""
      - "Instance IP: {{ instance_ip }}"
      - ""
      - "SSH Access:"
      - "  ssh ec2-user@{{ instance_ip }}"
      - ""

- name: Display Cockpit access
  debug:
    msg:
      - "Cockpit Web Console:"
      - "  URL: https://{{ instance_ip }}:9090"
      - "  Username: admin (or ec2-user)"
      - "  Note: Accept self-signed certificate warning"
      - ""
  when: cockpit_status.status.ActiveState is defined and cockpit_status.status.ActiveState == 'active'

- name: Display Redfish API access
  debug:
    msg:
      - "Redfish API (Sushy Emulator):"
      - "  URL: http://{{ instance_ip }}:8000/redfish/v1/"
      - "  Systems: http://{{ instance_ip }}:8000/redfish/v1/Systems"
      - ""
  when: sushy_status.status.ActiveState is defined and sushy_status.status.ActiveState == 'active'

- name: Display noVNC HTTP access
  debug:
    msg:
      - "noVNC Web GUI (HTTP):"
      - "  URL: http://{{ instance_ip }}:6080/vnc.html"
      - ""
  when: novnc_http_status.status.ActiveState is defined and novnc_http_status.status.ActiveState == 'active'

- name: Display noVNC HTTPS access
  debug:
    msg:
      - "noVNC Web GUI (HTTPS):"
      - "  URL: https://{{ instance_ip }}:6081/vnc.html"
      - "  Note: Accept self-signed certificate warning"
      - ""
  when: novnc_https_status.status.ActiveState is defined and novnc_https_status.status.ActiveState == 'active'

- name: Display VM management info
  debug:
    msg:
      - "VM Management:"
      - "  List VMs: ssh ec2-user@{{ instance_ip }} 'sudo virsh list --all'"
      - "  VNC Console: VMs accessible via noVNC (if configured)"
      - ""
      - "=========================================="

- name: Display OpenShift cluster access information
  debug:
    msg:
      - ""
      - "=========================================="
      - "OpenShift Cluster Access Information"
      - "=========================================="
      - ""
      - "Cluster Information:"
      - "  Name: {{ cluster_name_from_config.stdout }}"
      - "  Version: {{ cluster_version.stdout | default('Unable to fetch - cluster may still be installing') }}"
      - "  Nodes: {{ node_count.stdout | default('Unable to fetch') }}"
      - "  Degraded Operators: {{ degraded_operators_count.stdout | default('Unable to check') }}"
      - ""
      - "Access URLs:"
      - "  API Server: {{ api_server_url.stdout }}"
      - "  Web Console: {{ console_url }}"
      - ""
      - "Credentials:"
      - "  Username: kubeadmin"
      - "  Password: {{ kubeadmin_password }}"
      - "  (Also saved to: /home/ec2-user/kubeadmin-password)"
      - ""
      - "Kubeconfig Location:"
      - "  Root user: /root/.kube/config"
      - "  EC2 user: /home/ec2-user/.kube/config"
      - "  Original: {{ ocp_install_dir }}/auth/kubeconfig"
      - ""
      - "Command Line Access:"
      - "  SSH to instance: ssh ec2-user@{{ instance_ip }}"
      - "  Run oc commands: oc get nodes"
      - "  Check cluster: oc get clusterversion"
      - "  View all resources: oc get all -A"
      - "  Check operators: oc get co"
      - ""
      - "Web Console Access:"
      - "  1. Open browser to: {{ console_url }}"
      - "  2. Login with username: kubeadmin"
      - "  3. Login with password: {{ kubeadmin_password }}"
      - ""
      - "Saved Access Information:"
      - "  File: /home/ec2-user/openshift-cluster-access.txt"
      - "  View: ssh ec2-user@{{ instance_ip }} 'cat ~/openshift-cluster-access.txt'"
      - ""
      - "=========================================="
  when: openshift_installed

- name: Display OpenShift not installed message
  debug:
    msg:
      - ""
      - "=========================================="
      - "OpenShift Status"
      - "=========================================="
      - ""
      - "✗ OpenShift cluster is NOT installed yet"
      - ""
      - "To install OpenShift:"
      - "  ansible-playbook playbook.yml -e install_openshift=true"
      - ""
      - "Or check installation status:"
      - "  ssh ec2-user@{{ instance_ip }}"
      - "  cat ~/ocp-install/.openshift_install.log"
      - ""
      - "=========================================="
  when: not openshift_installed
