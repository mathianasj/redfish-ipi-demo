---
- name: Ensure /usr/local/bin is in ec2-user's PATH
  ansible.builtin.lineinfile:
    path: /home/ec2-user/.bashrc
    line: 'export PATH="/usr/local/bin:$PATH"'
    regexp: '^export PATH="/usr/local/bin'
    state: present
    create: yes
    owner: ec2-user
    group: ec2-user
    mode: '0644'

- name: Ensure /usr/local/bin is in ec2-user's bash_profile
  ansible.builtin.lineinfile:
    path: /home/ec2-user/.bash_profile
    line: 'export PATH="/usr/local/bin:$PATH"'
    regexp: '^export PATH="/usr/local/bin'
    state: present
    create: yes
    owner: ec2-user
    group: ec2-user
    mode: '0644'

- name: Create temporary download directory
  ansible.builtin.file:
    path: /tmp/oc-mirror-download
    state: directory
    mode: '0755'

- name: Download oc-mirror v2 tool
  ansible.builtin.get_url:
    url: https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest-4.20/oc-mirror.tar.gz
    dest: /tmp/oc-mirror-download/oc-mirror.tar.gz
    mode: '0644'
    timeout: 300

- name: Extract oc-mirror
  ansible.builtin.unarchive:
    src: /tmp/oc-mirror-download/oc-mirror.tar.gz
    dest: /tmp/oc-mirror-download/
    remote_src: yes
    creates: /tmp/oc-mirror-download/oc-mirror

- name: List extracted files for debugging
  ansible.builtin.shell: ls -la /tmp/oc-mirror-download/
  register: extracted_files
  changed_when: false

- name: Display extracted files
  debug:
    msg: "{{ extracted_files.stdout_lines }}"

- name: Check if oc-mirror binary exists
  ansible.builtin.stat:
    path: /tmp/oc-mirror-download/oc-mirror
  register: oc_mirror_stat

- name: Fail if oc-mirror not found
  fail:
    msg: "oc-mirror binary not found in /tmp/oc-mirror-download/ after extraction"
  when: not oc_mirror_stat.stat.exists

- name: Install oc-mirror to /usr/local/bin
  ansible.builtin.copy:
    src: /tmp/oc-mirror-download/oc-mirror
    dest: /usr/local/bin/oc-mirror
    mode: '0755'
    remote_src: yes

- name: Cleanup download directory
  ansible.builtin.file:
    path: /tmp/oc-mirror-download
    state: absent

- name: Install podman (required for oc-mirror)
  ansible.builtin.dnf:
    name:
      - podman
      - skopeo
    state: present

- name: Create podman auth directories for ec2-user
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
    owner: ec2-user
    group: ec2-user
  loop:
    - /home/ec2-user/.docker
    - /home/ec2-user/.config/containers

- name: Check if pull secret exists in playbook directory
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/pullsecret.json"
  register: local_pull_secret
  delegate_to: localhost
  become: false

- name: Fail if pull secret not found
  fail:
    msg: |
      ========================================
      Pull secret not found!
      ========================================

      Expected location: {{ playbook_dir }}/pullsecret.json

      To get your pull secret:
        1. Visit: https://console.redhat.com/openshift/downloads
        2. Download your pull secret
        3. Save it as: {{ playbook_dir }}/pullsecret.json

      Then re-run this playbook.
      ========================================
  when: not local_pull_secret.stat.exists

- name: Copy pull secret to ec2-user .docker directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/pullsecret.json"
    dest: /home/ec2-user/.docker/config.json
    mode: '0600'
    owner: ec2-user
    group: ec2-user

- name: Copy pull secret to ec2-user podman auth directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/pullsecret.json"
    dest: /home/ec2-user/.config/containers/auth.json
    mode: '0600'
    owner: ec2-user
    group: ec2-user

- name: Display pull secret status
  debug:
    msg:
      - "✓ Pull secret copied to EC2 instance"
      - "  - /home/ec2-user/.docker/config.json"
      - "  - /home/ec2-user/.config/containers/auth.json"

- name: Verify oc-mirror installation
  ansible.builtin.command: /usr/local/bin/oc-mirror version
  register: oc_mirror_version
  changed_when: false

- name: Display oc-mirror installed version
  debug:
    msg:
      - "=========================================="
      - "oc-mirror v2 Installation Complete"
      - "=========================================="
      - ""
      - "oc-mirror version:"
      - "{{ oc_mirror_version.stdout_lines }}"
      - ""
      - "Installed to: /usr/local/bin/oc-mirror"
      - ""
      - "=========================================="

- name: Download mirror-registry tool
  ansible.builtin.get_url:
    url: https://mirror.openshift.com/pub/cgw/mirror-registry/latest/mirror-registry-amd64.tar.gz
    dest: /tmp/mirror-registry.tar.gz
    mode: '0644'
    timeout: 300

- name: Create mirror-registry extraction directory
  ansible.builtin.file:
    path: /tmp/mirror-registry-extract
    state: directory
    mode: '0755'

- name: Extract mirror-registry
  ansible.builtin.unarchive:
    src: /tmp/mirror-registry.tar.gz
    dest: /tmp/mirror-registry-extract/
    remote_src: yes

- name: Find mirror-registry binary
  ansible.builtin.find:
    paths: /tmp/mirror-registry-extract
    patterns: 'mirror-registry'
    recurse: yes
  register: mirror_registry_binary

- name: Install mirror-registry to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ mirror_registry_binary.files[0].path }}"
    dest: /usr/local/bin/mirror-registry
    mode: '0755'
    remote_src: yes

- name: Cleanup mirror-registry download
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/mirror-registry.tar.gz
    - /tmp/mirror-registry-extract

- name: Create mirror registry data directory
  ansible.builtin.file:
    path: /home/ec2-user/mirror-registry
    state: directory
    mode: '0755'
    owner: ec2-user
    group: ec2-user

- name: Check if mirror registry is already installed
  ansible.builtin.stat:
    path: /home/ec2-user/mirror-registry/quay-rootCA/rootCA.pem
  register: mirror_registry_installed

- name: Install mirror registry
  ansible.builtin.shell: |
    /usr/local/bin/mirror-registry install \
      --quayHostname {{ ansible_host }} \
      --quayRoot /home/ec2-user/mirror-registry \
      --initPassword admin123 \
      --initUser admin \
      --verbose
  args:
    creates: /home/ec2-user/mirror-registry/quay-rootCA/rootCA.pem
  become: true
  become_user: ec2-user
  when: not mirror_registry_installed.stat.exists

- name: Configure firewall for mirror registry (HTTPS)
  ansible.posix.firewalld:
    zone: public
    port: 8443/tcp
    permanent: yes
    state: enabled
  notify: reload firewalld
  ignore_errors: true

- name: Verify mirror registry is running
  ansible.builtin.shell: podman ps | grep quay || true
  register: quay_status
  changed_when: false
  become: true
  become_user: ec2-user

- name: Display mirror registry installation status
  debug:
    msg:
      - "=========================================="
      - "Mirror Registry Installation Complete"
      - "=========================================="
      - ""
      - "Mirror Registry (Quay):"
      - "  URL: https://{{ ansible_host }}:8443"
      - "  Username: admin"
      - "  Password: admin123"
      - "  Storage: /home/ec2-user/mirror-registry"
      - ""
      - "CA Certificate:"
      - "  Location: /home/ec2-user/mirror-registry/quay-rootCA/rootCA.pem"
      - ""
      - "Trust the CA certificate:"
      - "  sudo cp /home/ec2-user/mirror-registry/quay-rootCA/rootCA.pem /etc/pki/ca-trust/source/anchors/"
      - "  sudo update-ca-trust"
      - ""
      - "Login to registry:"
      - "  podman login -u admin -p admin123 {{ ansible_host }}:8443"
      - ""
      - "Registry Status:"
      - "  {{ 'Running' if quay_status.stdout else 'Not running - check logs' }}"
      - ""
      - "=========================================="
