---
- name: Find EC2 instance and discover DNS domain
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    aws_region: us-east-2
    instance_name: nested-virt-host
    ssh_private_key_path: "~/.ssh/id_rsa_fips"
    # route53_hosted_zone_id: Z1234567890ABC  # Optional: specify to use Route53 domain
    # ocp_base_domain: example.com  # Optional: override domain

  tasks:
    - name: Look up Route53 hosted zone if provided
      amazon.aws.route53_zone_info:
        query: hosted_zone
        hosted_zone_id: "{{ route53_hosted_zone_id }}"
      register: route53_zone_lookup
      when:
        - route53_hosted_zone_id is defined
        - ocp_base_domain is not defined

    - name: Set DNS domain from Route53 zone
      set_fact:
        ocp_base_domain: "{{ route53_zone_lookup.HostedZones[0].Name.rstrip('.') }}"
      when:
        - route53_hosted_zone_id is defined
        - ocp_base_domain is not defined
        - route53_zone_lookup.HostedZones | length > 0

    - name: Display DNS domain being used
      debug:
        msg:
          - "DNS Configuration:"
          - "  Domain: {{ ocp_base_domain | default('example.com') }}"
          - "  {% if route53_hosted_zone_id is defined %}Route53 Zone ID: {{ route53_hosted_zone_id }}{% else %}Using default domain{% endif %}"
      when: ocp_base_domain is defined or route53_hosted_zone_id is defined

    - name: Find EC2 instance by name
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          "instance-state-name": ["running"]
      register: instance_info

    - name: Verify instance exists
      fail:
        msg: "No running EC2 instance found with name '{{ instance_name }}' in region {{ aws_region }}"
      when: instance_info.instances | length == 0

    - name: Add EC2 instance to inventory
      add_host:
        hostname: "{{ instance_info.instances[0].public_ip_address }}"
        groupname: nested_virt_hosts
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ ssh_private_key_path }}"
        ocp_base_domain: "{{ ocp_base_domain | default('example.com') }}"

    - name: Display instance information
      debug:
        msg:
          - "Found EC2 instance: {{ instance_name }}"
          - "Public IP: {{ instance_info.instances[0].public_ip_address }}"
          - "Instance ID: {{ instance_info.instances[0].instance_id }}"
          - "OpenShift Domain: {{ ocp_base_domain | default('example.com') }}"
          - "Proceeding with OpenShift preparation and installation..."

- name: Prepare and Install OpenShift Cluster
  hosts: nested_virt_hosts
  become: true
  gather_facts: true

  pre_tasks:
    - name: Check if virbr0-keepalive VM exists
      ansible.builtin.shell: virsh list --all --name | grep -E "^virbr0-keepalive$" || echo ""
      register: keepalive_vm_exists
      changed_when: false

    - name: Check if virbr0-keepalive VM is running
      ansible.builtin.shell: virsh list --name | grep -E "^virbr0-keepalive$" || echo ""
      register: keepalive_vm_running
      changed_when: false
      when: keepalive_vm_exists.stdout != ""

    - name: Start virbr0-keepalive VM if not running
      ansible.builtin.shell: virsh start virbr0-keepalive
      when:
        - keepalive_vm_exists.stdout != ""
        - keepalive_vm_running.stdout == ""

    - name: Ensure virbr0-keepalive VM is set to autostart
      ansible.builtin.shell: virsh autostart virbr0-keepalive
      when: keepalive_vm_exists.stdout != ""
      ignore_errors: true

    - name: Wait for virbr0 to come up
      ansible.builtin.pause:
        seconds: 3
      when:
        - keepalive_vm_exists.stdout != ""
        - keepalive_vm_running.stdout == ""

    - name: Verify virbr0 is UP
      ansible.builtin.shell: ip link show virbr0 | grep -q "state UP" && echo "UP" || echo "DOWN"
      register: virbr0_state
      changed_when: false

    - name: Fail if virbr0 is not UP
      fail:
        msg: |
          virbr0 interface is not UP!

          The virbr0 network is required for OpenShift installation.

          Current state: {{ virbr0_state.stdout }}

          Troubleshooting:
          1. Check if virbr0-keepalive VM is running: sudo virsh list
          2. Start it if needed: sudo virsh start virbr0-keepalive
          3. Check network status: ip link show virbr0
      when: virbr0_state.stdout != "UP"

    - name: Display workflow overview
      debug:
        msg:
          - "=========================================="
          - "OpenShift Complete Installation Workflow"
          - "=========================================="
          - ""
          - "✓ virbr0 network is UP and ready"
          - ""
          - "Phase 1: Preparation (5-10 minutes)"
          - "  - Configure DNS records"
          - "  - Create master VMs"
          - "  - Generate install-config.yaml"
          - ""
          - "Phase 2: Installation (45-60 minutes)"
          - "  - Run openshift-install in tmux"
          - "  - Monitor progress"
          - "  - Configure access"
          - ""
          - "Total estimated time: 50-70 minutes"
          - "=========================================="

  roles:
    - role: openshift_install
      tags: ['prepare']
      vars:
        ocp_base_domain: "{{ hostvars[inventory_hostname].ocp_base_domain }}"

    - role: openshift_install_cluster
      tags: ['install']
      vars:
        ocp_base_domain: "{{ hostvars[inventory_hostname].ocp_base_domain }}"

  post_tasks:
    - name: Display completion summary
      debug:
        msg:
          - "=========================================="
          - "✓ OpenShift Complete Installation Finished"
          - "=========================================="
          - ""
          - "Your OpenShift cluster is now ready!"
          - ""
          - "Access information saved to:"
          - "  /home/ec2-user/openshift-cluster-access.txt"
          - ""
          - "Quick access:"
          - "  ssh ec2-user@{{ ansible_host }}"
          - "  cat ~/openshift-cluster-access.txt"
          - ""
          - "=========================================="
