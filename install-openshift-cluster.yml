---
- name: Find EC2 instance
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    aws_region: us-east-2
    instance_name: nested-virt-host
    ssh_private_key_path: "~/.ssh/id_rsa_fips"

  tasks:
    - name: Find EC2 instance by name
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          "instance-state-name": ["running"]
      register: instance_info

    - name: Verify instance exists
      fail:
        msg: "No running EC2 instance found with name '{{ instance_name }}' in region {{ aws_region }}"
      when: instance_info.instances | length == 0

    - name: Add EC2 instance to inventory
      add_host:
        hostname: "{{ instance_info.instances[0].public_ip_address }}"
        groupname: nested_virt_hosts
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ ssh_private_key_path }}"

    - name: Display instance information
      debug:
        msg:
          - "Found EC2 instance: {{ instance_name }}"
          - "Public IP: {{ instance_info.instances[0].public_ip_address }}"
          - "Instance ID: {{ instance_info.instances[0].instance_id }}"
          - "Proceeding with OpenShift cluster installation..."

- name: Install OpenShift Cluster
  hosts: nested_virt_hosts
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display installation notice
      debug:
        msg:
          - "=========================================="
          - "OpenShift Cluster Installation"
          - "=========================================="
          - ""
          - "This playbook will:"
          - "  1. Verify the environment is ready"
          - "  2. Start openshift-install in a tmux session"
          - "  3. Monitor progress (45-60 minutes)"
          - "  4. Configure kubeconfig files"
          - "  5. Display access credentials"
          - ""
          - "You can safely disconnect - the installation"
          - "will continue in tmux on the remote host."
          - ""
          - "To monitor manually:"
          - "  ssh ec2-user@{{ ansible_host }}"
          - "  tmux attach -t openshift-install"
          - "=========================================="

  roles:
    - openshift_install_cluster

  post_tasks:
    - name: Display next steps
      debug:
        msg:
          - "=========================================="
          - "Installation Complete - Next Steps"
          - "=========================================="
          - ""
          - "Access the Web Console:"
          - "  1. Open the console URL in your browser"
          - "  2. Login with kubeadmin and the displayed password"
          - ""
          - "Use the CLI:"
          - "  ssh ec2-user@{{ ansible_host }}"
          - "  oc get nodes"
          - "  oc get co"
          - ""
          - "All access information saved to:"
          - "  /home/ec2-user/openshift-cluster-access.txt"
          - ""
          - "=========================================="
