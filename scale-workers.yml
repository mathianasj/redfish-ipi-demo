---
- name: Find EC2 instance
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    aws_region: us-east-2
    instance_name: nested-virt-host
    ssh_private_key_path: "~/.ssh/id_rsa_fips"

  tasks:
    - name: Find EC2 instance by name
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          "instance-state-name": ["running"]
      register: instance_info

    - name: Verify instance exists
      fail:
        msg: "No running EC2 instance found with name '{{ instance_name }}' in region {{ aws_region }}"
      when: instance_info.instances | length == 0

    - name: Add EC2 instance to inventory
      add_host:
        hostname: "{{ instance_info.instances[0].public_ip_address }}"
        groupname: nested_virt_hosts
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ ssh_private_key_path }}"

    - name: Display instance information
      debug:
        msg:
          - "Found EC2 instance: {{ instance_name }}"
          - "Public IP: {{ instance_info.instances[0].public_ip_address }}"
          - "Instance ID: {{ instance_info.instances[0].instance_id }}"

- name: Scale OpenShift Worker Nodes
  hosts: nested_virt_hosts
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display scaling information
      debug:
        msg:
          - "=========================================="
          - "OpenShift Worker Scaling"
          - "=========================================="
          - ""
          - "Target worker count: {{ worker_count | default('Not specified - will show current state') }}"
          - ""
          - "This playbook will:"
          - "  1. Detect cluster name and domain from OpenShift"
          - "  2. Compare current vs desired worker count"
          - "  3. Scale up: Create VMs and BareMetalHosts"
          - "  4. Scale down: Deprovision BareMetalHosts, remove VMs"
          - ""
          - "Worker specifications:"
          - "  Memory: {{ worker_vm_memory | default(16384) }} MB"
          - "  vCPUs: {{ worker_vm_vcpus | default(4) }}"
          - "  Disk: {{ worker_vm_disk_size | default(120) }} GB"
          - "=========================================="

  roles:
    - scale_workers

  post_tasks:
    - name: Display next steps
      debug:
        msg:
          - "=========================================="
          - "Worker Scaling Complete"
          - "=========================================="
          - ""
          - "Check worker nodes:"
          - "  oc get nodes -l node-role.kubernetes.io/worker"
          - ""
          - "Check BareMetalHosts:"
          - "  oc get baremetalhosts -n openshift-machine-api"
          - ""
          - "Monitor provisioning:"
          - "  watch 'oc get baremetalhosts -n openshift-machine-api'"
          - ""
          - "View worker VMs:"
          - "  sudo virsh list --all | grep worker"
          - ""
          - "State file: /home/ec2-user/openshift-workers-state.json"
          - "=========================================="
